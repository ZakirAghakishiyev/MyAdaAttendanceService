version: "3.9"

services:
  db:
    image: postgres:16
    container_name: my-ada-attendance-db
    restart: always
    environment:
      POSTGRES_DB: my_ada_attendance_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_ada_attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-ada-attendance-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=my_ada_attendance_db;Username=postgres;Password=12345
      # After migrations, load 102 lessons from SeedData/lessons.pipe.txt when the Lessons table is empty
      Database__SeedLessonsIfEmpty: "true"
    ports:
      - "5008:8080"

volumes:
  postgres_data:
